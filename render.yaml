services:
  - type: web
    name: nyaysaathi-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput"
    startCommand: "gunicorn nyaysaathi_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: nyaysaathi_project.settings_production
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.vercel.app"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: nyaysaathi
      - key: SEARCH_MODE
        value: keyword
      - key: CORS_ALLOWED_ORIGINS
        value: "https://nyaysaathiiii.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://nyaysaathiiii.vercel.app"
      - key: OPENAI_API_KEY
        sync: false
