services:
  - type: web
    name: nyaysaathi-backend
    runtime: python
    rootDir: backend
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput
    startCommand: >
      gunicorn nyayasaathi.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --threads 4
      --timeout 120
      --access-logfile -
      --error-logfile -
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: nyayasaathi.settings
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://nyaysaathiiii.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://nyaysaathiiii.vercel.app"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: nyaysaathi
      - key: OPENAI_API_KEY
        sync: false
      - key: MODEL_MODE
        value: hybrid
      - key: DATABASE_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@nyaysaathi.in"