name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        env:
          DJANGO_SECRET_KEY: test-secret
          DEBUG: "True"
          MONGODB_URI: mongodb://localhost:27017/
          MONGODB_DB: nyaysaathi
        run: python manage.py check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        env:
          VITE_API_URL: https://example.onrender.com
          VITE_FALLBACK_API_URL: https://example.onrender.com/api
        run: npm run build
